services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: translatrix_pro
      POSTGRES_USER: translatrix
      POSTGRES_PASSWORD: translatrix_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U translatrix -d translatrix_pro"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DEBUG: "true"
      DATABASE_URL: postgresql://translatrix:translatrix_password@postgres:5432/translatrix_pro
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-development-secret-key-minimum-32-characters-long}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-development-jwt-secret-minimum-32-characters}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-DevOnly!2026}
      DEV_SEED_PASSWORD: ${DEV_SEED_PASSWORD:-DevOnly!2026}
      BACKEND_CORS_ORIGINS: '["http://localhost:8080","http://localhost:5173"]'
      FRONTEND_UPLOAD_DIR: /app/data/uploads
      RUN_DB_BOOTSTRAP: "true"
      SEED_DEVELOPMENT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/data/uploads

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
